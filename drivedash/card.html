<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DriveDesh - Card Payment</title>

<style>
    body {
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: #0b132b;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        display: flex;
        flex-direction: column;
        background: #1f2c5c;
        padding: 30px 40px;
        border-radius: 15px;
        box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        max-width: 900px;
        width: 100%;
    }

    h1 {
        text-align: center;
        color: #ffffff;
        margin-bottom: 25px;
    }

    form {
        display: flex;
        flex-wrap: wrap;
        gap: 20px;
        justify-content: center;
        width: 100%;
        color: white;
    }

    .form-group {
        display: flex;
        flex-direction: column;
        margin-bottom: 15px;
        min-width: 200px;
    }

    label {
        font-weight: bold;
        margin-bottom: 5px;
        color: white;
    }

    input, select {
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #4b7bec;
        outline: none;
        font-size: 16px;
        background: #0b132b;
        color: white;
    }

    input::placeholder {
        color: #cbd5e1;
    }

    input:focus, select:focus {
        border-color: #4b7bec;
    }

    button {
        padding: 12px 30px;
        border: none;
        border-radius: 10px;
        background: linear-gradient(90deg, #4b7bec, #a55eea);
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
        margin-top: 20px;
        align-self: center;
    }

    button:hover {
        opacity: 0.9;
    }
</style>
</head>

<body>
<div class="container">
    <h1>Card Payment</h1>
    <form id="cardPaymentForm">
        <div class="form-group">
            <label for="cardType">Card Type</label>
            <select id="cardType" required>
                <option value="">--Select Card--</option>
                <option>HDFC Bank Debit Card</option>
                <option>ICICI Bank Debit Card</option>
                <option>SBI Debit Card</option>
                <option>Axis Bank Debit Card</option>
                <option>HDFC Bank Credit Card</option>
                <option>ICICI Bank Credit Card</option>
                <option>Axis Bank Credit Card</option>
                <option>SBI Credit Card</option>
                <option>PNB Credit Card</option>
            </select>
        </div>

        <div class="form-group">
            <label for="cardNumber">Card Number</label>
            <input type="text" id="cardNumber" pattern="[0-9]{16}" placeholder="16-digit card number" required>
        </div>

        <div class="form-group">
            <label for="cardName">Cardholder Name</label>
            <input type="text" id="cardName" placeholder="Name on card" required>
        </div>

        <div class="form-group">
            <label for="expiryDate">Expiry Date</label>
            <input type="month" id="expiryDate" required>
        </div>

        <div class="form-group">
            <label for="cvv">CVV / PIN</label>
            <input type="password" id="cvv" pattern="[0-9]{3,4}" placeholder="3 or 4 digits" required>
        </div>

        <div class="form-group">
            <label for="amount">Amount (₹)</label>
            <input type="number" id="amount" min="1" placeholder="Enter amount" required>
        </div>

        <button type="submit">Proceed to Pay</button>
    </form>
</div>

<script>
document.getElementById('cardPaymentForm').addEventListener('submit', function(e){
    e.preventDefault();

    const cardType = document.getElementById('cardType').value;
    const cardNumber = document.getElementById('cardNumber').value;
    const cardName = document.getElementById('cardName').value;
    const expiryDate = document.getElementById('expiryDate').value;
    const cvv = document.getElementById('cvv').value;
    const amount = document.getElementById('amount').value;

    if(!cardType || !cardNumber || !cardName || !expiryDate || !cvv || !amount){
        alert("Please fill all fields correctly.");
        return;
    }

    alert(`Payment of ₹${amount} using ${cardType} is successful!\nCardholder: ${cardName}`);
    document.getElementById('cardPaymentForm').reset();
});
</script>

</body>
</html>

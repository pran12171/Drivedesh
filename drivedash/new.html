<html><body><h3>Session Storage Example</h3><input id="name" placeholder="Enter name"><button onclick="save()">Save</button><button onclick="show()">Show</button><p id="result"></p><script>function save(){    let n = document.getElementById("name").value;    sessionStorage.setItem("username", n);}function show(){    document.getElementById("result").innerHTML =    sessionStorage.getItem("username");}</script></body></html>
